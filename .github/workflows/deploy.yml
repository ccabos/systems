name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - run: pip install "mkdocs>=1.5,<2.0" mkdocs-material pymdown-extensions mkdocs-with-pdf

      - name: Install WeasyPrint system dependencies
        run: sudo apt-get install -y libpangocairo-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf2.0-0

      - name: Build MkDocs site
        working-directory: projects/systems-introduction-book
        env:
          ENABLE_PDF_EXPORT: 1
        run: mkdocs build --site-dir ../../site

      - name: Commit generated PDF to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p dist
          cp site/Systems_Thinking_Book_MkDocs.pdf dist/
          git add dist/Systems_Thinking_Book_MkDocs.pdf
          git diff --staged --quiet || git commit -m "chore: update generated PDF [skip ci]"
          git push

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
